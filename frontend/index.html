<!doctype html>
<html>
  <head>
    <title>PO Management</title>

    <!-- ✅ Prevent favicon 404 -->
    <link rel="icon" href="data:," />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow p-4">

        <!-- Google config -->
        

        <!-- Google button -->
        <div id="googleSignInDiv" class="mb-3"></div>

        <h2 class="mb-4">Create Purchase Order</h2>

        <div class="mb-3">
          <label class="form-label">Vendor</label>
          <select id="vendorSelect" class="form-select"></select>
        </div>

        <h4>Products</h4>

        <table id="productTable" class="table table-bordered mt-3">
          <tr>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Action</th>
          </tr>
        </table>

        <!-- ✅ No inline onclick -->
        <button class="btn btn-primary mt-2" id="addProductBtn">
          + Add Product
        </button>

        <h4 class="mt-4">Total: ₹ <span id="totalAmount">0</span></h4>

        <!-- ✅ No inline onclick -->
        <button class="btn btn-success mt-3" id="submitBtn">
          Submit Order
        </button>

        <!-- Order Summary -->
        <div id="orderSummary" class="alert alert-success mt-4 d-none"></div>

      </div>
    </div>

    <!-- Your script -->
    <script src="script.js"></script>
  </body>
</html>
